name: PR Intake

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: read

concurrency:
  group: pr-intake-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  intake:
    name: Pull request intake gate
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout trusted base revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch pull request head without checking it out
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/pr-intake/head"
          test "$(git rev-parse refs/remotes/pr-intake/head)" = "${HEAD_SHA}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run trusted pull request intake gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        shell: bash
        run: >-
          node --experimental-strip-types scripts/check-pr-intake.ts
          --base "${BASE_SHA}"
          --head "${HEAD_SHA}"
          --body-env PR_BODY
          --labels-env PR_LABELS_JSON
          --author-association-env PR_AUTHOR_ASSOCIATION
          --require-pr-body
