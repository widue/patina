name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing version tag to publish, for example 1.6.1"
        required: true
        type: string
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*-*"

permissions:
  contents: write

jobs:
  resolve:
    name: Resolve release tag
    runs-on: windows-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $semverPattern = '(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9A-Za-z-][0-9A-Za-z-]*))*))?'

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $refName = "${{ github.ref_name }}"
            if ($refName -notmatch "^v(?<version>$semverPattern)$") {
              throw "Tag '$refName' is not a release version tag."
            }
            $version = $Matches.version
          }

          if ($version -notmatch "^$semverPattern$") {
            throw "Version '$version' is not a valid SemVer version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved release version: $version"

      - name: Confirm release tag
        shell: pwsh
        run: |
          $tag = "${{ steps.release.outputs.tag }}"

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $existingTag = git ls-remote --tags origin "refs/tags/$tag"
            if (-not $existingTag) {
              throw "Tag $tag does not exist. Prepare the release commit and push the tag first."
            }
            Write-Host "Tag $tag exists. The workflow will publish from that tag."
          } else {
            Write-Host "Release was triggered by pushed tag $tag."
          }

          $tagRef = "refs/tags/$tag"
          git fetch --force origin "${tagRef}:${tagRef}"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch $tag from origin."
          }

          $tagCommit = git rev-list -n 1 $tag
          Write-Host "Publishing $tag from $tagCommit"

  version-files:
    name: Version files gate
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Validate version files
        run: node --experimental-strip-types scripts/release.ts validate-version-files ${{ needs.resolve.outputs.version }}

  changelog:
    name: Changelog gate
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Validate changelog
        run: node --experimental-strip-types scripts/release.ts validate-changelog ${{ needs.resolve.outputs.version }}

  release-notes:
    name: Release notes artifact
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Write release notes
        run: node --experimental-strip-types scripts/release.ts write-release-notes ${{ needs.resolve.outputs.version }} dist-release/release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist-release/release-notes.md
          if-no-files-found: error
          retention-days: 7

  frontend:
    name: Frontend release quality gate
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run check

  rust:
    name: Rust release quality gate
    runs-on: windows-latest
    needs: resolve

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set up Rust from rust-toolchain.toml
        run: rustup toolchain install --no-self-update

      - name: Install dependencies
        run: npm ci

      - name: Run Rust quality gate
        run: npm run check:rust

  build:
    name: Build Tauri bundle
    runs-on: windows-latest
    needs: [resolve, version-files, changelog, release-notes, frontend, rust]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set up Rust from rust-toolchain.toml
        run: rustup toolchain install --no-self-update

      - name: Install dependencies
        run: npm ci

      - name: Ensure updater signing key exists
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Tauri bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [resolve, release-notes, build]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Download Tauri bundle
        uses: actions/download-artifact@v4
        with:
          name: tauri-bundle
          path: src-tauri/target/release/bundle/nsis

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist-release

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-release | Out-Null
          $version = "${{ needs.resolve.outputs.version }}"
          npm run release:prepare-assets -- $version src-tauri/target/release/bundle dist-release ${{ github.repository }} windows-x86_64

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist-release/Patina_${{ needs.resolve.outputs.version }}_x64-setup.exe
            dist-release/latest.json
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: Patina v${{ needs.resolve.outputs.version }}
          body_path: dist-release/release-notes.md
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.version, '-') }}
          files: |
            dist-release/Patina_${{ needs.resolve.outputs.version }}_x64-setup.exe
            dist-release/latest.json

  r2:
    name: Sync R2 updater mirror
    runs-on: windows-latest
    needs: [resolve, publish]

    steps:
      - name: Check R2 mirror configuration
        id: r2
        shell: pwsh
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          $required = @(
            "R2_ACCOUNT_ID",
            "R2_ACCESS_KEY_ID",
            "R2_SECRET_ACCESS_KEY",
            "R2_BUCKET",
            "R2_PUBLIC_BASE_URL"
          )
          $missing = @()
          foreach ($name in $required) {
            if (-not [Environment]::GetEnvironmentVariable($name)) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            "enabled=false" >> $env:GITHUB_OUTPUT
            Write-Host "R2 mirror secrets are not fully configured; skipping R2 sync."
            Write-Host "Missing: $($missing -join ', ')"
          } else {
            "enabled=true" >> $env:GITHUB_OUTPUT
            Write-Host "R2 mirror is configured."
          }

      - name: Checkout release tag
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.tag }}
          fetch-depth: 0

      - name: Set up Node
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Download release assets
        if: steps.r2.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist-release

      - name: Ensure AWS CLI for R2 sync
        if: steps.r2.outputs.enabled == 'true'
        shell: pwsh
        run: |
          if (Get-Command aws -ErrorAction SilentlyContinue) {
            aws --version
            exit 0
          }

          choco install awscli -y --no-progress
          aws --version

      - name: Generate R2 updater manifest
        if: steps.r2.outputs.enabled == 'true'
        shell: pwsh
        env:
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          New-Item -ItemType Directory -Force dist-release/r2 | Out-Null
          $version = "${{ needs.resolve.outputs.version }}"
          $installerName = "Patina_${version}_x64-setup.exe"
          $r2BaseUrl = $env:R2_PUBLIC_BASE_URL.TrimEnd("/")
          $r2InstallerUrl = "$r2BaseUrl/releases/v$version/$installerName"
          $githubLatest = Get-Content "dist-release/latest.json" -Raw | ConvertFrom-Json
          $signature = $githubLatest.platforms.'windows-x86_64'.signature

          if (-not $signature) {
            throw "Could not read updater signature from dist-release/latest.json."
          }

          npm run release:latest -- $version $r2InstallerUrl $signature dist-release/r2/latest.json windows-x86_64

      - name: Upload R2 updater mirror
        if: steps.r2.outputs.enabled == 'true'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $version = "${{ needs.resolve.outputs.version }}"
          $installerName = "Patina_${version}_x64-setup.exe"
          $r2Endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"

          aws s3 cp `
            "dist-release/$installerName" `
            "s3://$env:R2_BUCKET/releases/v$version/$installerName" `
            --endpoint-url $r2Endpoint `
            --content-type "application/octet-stream"

          aws s3 cp `
            "dist-release/r2/latest.json" `
            "s3://$env:R2_BUCKET/latest.json" `
            --endpoint-url $r2Endpoint `
            --content-type "application/json" `
            --cache-control "no-cache"

      - name: Clean old R2 updater mirrors
        if: steps.r2.outputs.enabled == 'true'
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          $version = "${{ needs.resolve.outputs.version }}"
          $currentPrefix = "releases/v$version/"
          $r2Endpoint = "https://$env:R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          $objects = aws s3api list-objects-v2 `
            --bucket $env:R2_BUCKET `
            --prefix "releases/" `
            --delimiter "/" `
            --endpoint-url $r2Endpoint | ConvertFrom-Json

          $prefixes = @($objects.CommonPrefixes | ForEach-Object { $_.Prefix })
          foreach ($prefix in $prefixes) {
            if ($prefix -and $prefix -ne $currentPrefix) {
              Write-Host "Removing old R2 mirror prefix: $prefix"
              aws s3 rm "s3://$env:R2_BUCKET/$prefix" --recursive --endpoint-url $r2Endpoint
            }
          }
