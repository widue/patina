name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare, build, and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check tag
        id: tag
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $existingTag = git ls-remote --tags origin "refs/tags/v$version"
          if ($existingTag) {
            "TAG_EXISTS=true" >> $env:GITHUB_ENV
            Write-Host "Tag v$version already exists. The workflow will publish from the existing tag."
          } else {
            "TAG_EXISTS=false" >> $env:GITHUB_ENV
            Write-Host "Tag v$version does not exist. The workflow will create it."
          }

      - name: Checkout existing tag
        if: env.TAG_EXISTS == 'true'
        shell: pwsh
        run: |
          git fetch origin "refs/tags/v${{ inputs.version }}:refs/tags/v${{ inputs.version }}"
          git checkout "v${{ inputs.version }}"

      - name: Install dependencies
        run: npm ci

      - name: Sync version files
        if: env.TAG_EXISTS != 'true'
        run: node --experimental-strip-types scripts/release.ts sync-version ${{ inputs.version }}

      - name: Validate changelog
        run: node --experimental-strip-types scripts/release.ts validate-changelog ${{ inputs.version }}

      - name: Verify release notes generation
        run: node --experimental-strip-types scripts/release.ts write-release-notes ${{ inputs.version }} dist-release/release-notes.md

      - name: Build frontend
        if: env.TAG_EXISTS != 'true'
        run: npm run build

      - name: Run tests
        if: env.TAG_EXISTS != 'true'
        run: |
          npm test
          npm run test:replay

      - name: Check Rust
        if: env.TAG_EXISTS != 'true'
        working-directory: src-tauri
        run: cargo check

      - name: Commit version changes and tag
        if: env.TAG_EXISTS != 'true'
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/tauri.dev.conf.json src-tauri/tauri.local.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "release: v$version"
          } else {
            Write-Host "No version file changes to commit; tagging current commit."
          }
          git tag "v$version"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v$version"

      - name: Ensure updater signing key exists
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY secret."
          }
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-release | Out-Null
          $version = "${{ inputs.version }}"
          npm run release:prepare-assets -- $version src-tauri/target/release/bundle dist-release ${{ github.repository }} windows-x86_64

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: Time Tracker v${{ inputs.version }}
          body_path: dist-release/release-notes.md
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            dist-release/TimeTracker_${{ inputs.version }}_x64-setup.exe

      - name: Publish updater channel
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force updater-publish | Out-Null
          Copy-Item -LiteralPath dist-release/latest.json -Destination updater-publish/latest.json

          Set-Location updater-publish
          git init -b updates
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "updates: latest v${{ inputs.version }}"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin updates
